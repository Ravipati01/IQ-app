<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Monkey Brain Game</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div id="welcome">
<h1>🐵 Monkey Brain Game</h1>
<button onclick="startGame()">Start</button>
</div>

<div id="game" style="display:none;">
<div id="monkeyContainer">
<svg width="150" viewBox="0 0 200 200">
<circle cx="100" cy="80" r="50" fill="#A36F4C"/>
<circle cx="80" cy="70" r="8" fill="white"/><circle cx="120" cy="70" r="8" fill="white"/>
<circle cx="80" cy="70" r="4"/><circle cx="120" cy="70" r="4"/>
</svg>
</div>

<h3 id="category"></h3>
<h2 id="question"></h2>
<div id="options"></div>
<p id="feedback"></p>
</div>

<script src="puzzles.js"></script>
<script src="app.js"></script>
</body>
</html>
